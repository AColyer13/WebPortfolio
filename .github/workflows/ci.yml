# Quality gates on PRs and main (lint, audit, test, build, a11y, Lighthouse).
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Accessibility (axe)
        run: VITE_BASE_PATH=/Portfolio-Website/ node scripts/axe-preview.mjs
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Lighthouse
        run: VITE_BASE_PATH=/Portfolio-Website/ node scripts/lighthouse-preview.mjs
        env:
          VITE_BASE_PATH: /Portfolio-Website/
