# Build on push to main → commit dist/ output to the repository ROOT (same branch).
#
# GitHub Pages: Settings → Pages → Deploy from a branch → Branch: main → Folder: / (root)
#
# Vite entry stays under src/; CI publishes index.html, assets/, images/, etc. at repo root
# so Pages never serves dev source. Deploy commits use [skip ci] to avoid loops.
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify production bundle
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi
          if grep -qE 'assets/(index\.css|index\.js)"' dist/index.html; then
            echo "dist/index.html must use content-hashed asset URLs, not index.css/index.js."
            exit 1
          fi

      - name: Install Chrome + ChromeDriver for axe
        run: npx --yes browser-driver-manager@latest install chrome

      - name: Accessibility (axe)
        run: node scripts/axe-preview.mjs

      - name: Remove stale published files at repo root
        run: |
          rm -rf assets files images
          rm -f index.html theme-init.js vite.svg .nojekyll

      - name: Publish dist/ to repository root on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          clean: false
          commit-message: 'deploy: Pages build at repo root [skip ci]'
