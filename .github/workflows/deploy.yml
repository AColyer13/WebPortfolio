# Build on push to main → deploy dist/ via GitHub Actions (artifact + deploy-pages).
#
# GitHub Pages: Settings → Pages → Source: GitHub Actions (not "Deploy from a branch").
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify production bundle
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi
          if grep -qE 'assets/(index\.css|index\.js)"' dist/index.html; then
            echo "dist/index.html must use content-hashed asset URLs, not index.css/index.js."
            exit 1
          fi

      - name: Install Chrome + ChromeDriver for axe
        run: npx --yes browser-driver-manager@latest install chrome

      - name: Accessibility (axe — landmarks, forms, headings)
        run: node scripts/axe-preview.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
