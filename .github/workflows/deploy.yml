# Build on push to main → commit dist/ output to the repository ROOT (same branch).
#
# GitHub Pages: Settings → Pages → Deploy from a branch → Branch: main → Folder: / (root)
#
# Vite entry stays under src/; CI publishes index.html, assets/, images/, etc. at repo root
# so Pages never serves dev source. [skip ci] + paths-ignore avoid deploy loops.
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Test
        run: npm run test

      - name: Token contrast (design system)
        run: npm run test:contrast

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Accessibility (axe)
        run: VITE_BASE_PATH=/Portfolio-Website/ node scripts/axe-preview.mjs
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Lighthouse
        run: VITE_BASE_PATH=/Portfolio-Website/ node scripts/lighthouse-preview.mjs
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Remove previous Pages output at repo root
        run: |
          rm -rf assets images files icons
          rm -f manifest.webmanifest sw.js workbox-*.js registerSW.js

      - name: Publish dist/ to repository root on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          clean: false
          commit-message: 'deploy: Pages build at repo root [skip ci]'
